experiment:
  name: AdaQLoRA-Math
  seed: 42
  output_dir: outputs/adapters/adaqlora_math

model:
  name_or_path: Qwen/Qwen2.5-Math-7B
  trust_remote_code: true
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

data:
  train_file: data/processed/train.scored.jsonl
  eval_file: data/processed/dev.scored.jsonl
  prompt_template: math_cot
  max_seq_length: 2048
  text_field: text
  packing: false

lora:
  method: adaqlora
  base_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

adaptive_lora:
  budget_mode: equal_trainable_params
  rank_levels:
    low: 8
    mid: 16
    high: 32
  alpha_rule: alpha_equals_2r
  sensitivity_source: outputs/reports/sensitivity_probe.json
  rank_pattern_output: outputs/reports/rank_pattern.json

curriculum:
  enabled: true
  stages:
    - name: easy_warmup
      sampling_ratio:
        easy: 0.70
        medium: 0.30
        hard: 0.00
    - name: mixed_training
      sampling_ratio:
        easy: 0.30
        medium: 0.50
        hard: 0.20
    - name: hard_emphasis
      sampling_ratio:
        easy: 0.15
        medium: 0.35
        hard: 0.50

replay:
  enabled: true
  replay_ratio: 0.20
  lr_scale: 0.5
  max_replay_epochs: 0.5
  priority:
    - hard_wrong
    - high_confidence_wrong
    - arithmetic_error
    - reasoning_error

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0002
  num_train_epochs: 2
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  bf16: true
  gradient_checkpointing: true
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  report_to: tensorboard

evaluation:
  answer_field: answer
  prediction_field: prediction
  group_field: difficulty_group
