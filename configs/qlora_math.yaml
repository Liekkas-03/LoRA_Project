experiment:
  name: QLoRA-Math
  seed: 42
  output_dir: outputs/adapters/qlora_math

model:
  name_or_path: Qwen/Qwen2.5-Math-7B
  trust_remote_code: true
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

data:
  train_file: data/processed/train.jsonl
  eval_file: data/processed/dev.jsonl
  prompt_template: math_cot
  max_seq_length: 2048
  text_field: text
  packing: false

lora:
  method: qlora
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0002
  num_train_epochs: 2
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  bf16: true
  gradient_checkpointing: true
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  report_to: tensorboard

evaluation:
  answer_field: answer
  prediction_field: prediction
  group_field: difficulty_group
